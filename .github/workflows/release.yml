name: Release

on:
  push:
    tags:
      - 'v*'

# Keep default permissions minimal. Each job grants only what it needs.
permissions:
  contents: read

jobs:
  build-and-sign:
    name: Build and sign release artifacts
    runs-on: macos-latest

    permissions:
      contents: write
      id-token: write

    outputs:
      hashes: ${{ steps.sign.outputs.hashes }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Adjust this command to match Chaterm's actual release build command.
      - name: Build release artifacts
        run: npm run build

      - name: Install cosign
        uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9 # v3

      - name: Sign release artifacts
        id: sign
        env:
          COSIGN_YES: 'true'
          # Adjust this if your build output directory is not "dist".
          ARTIFACT_SOURCE_DIR: 'dist'
          ARTIFACT_OUTPUT_DIR: 'release-assets'
        run: |
          chmod +x scripts/sign-release-artifacts.sh
          scripts/sign-release-artifacts.sh

      - name: Upload GitHub Release assets
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: release-assets/*

  provenance:
    name: Generate SLSA provenance
    needs: build-and-sign

    permissions:
      actions: read
      id-token: write
      contents: write

    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a # v2.1.0
    with:
      base64-subjects: ${{ needs.build-and-sign.outputs.hashes }}
      upload-assets: true
