name: Release

on:
  push:
    tags:
      - 'v*'

# Keep default permissions minimal. Each job grants only what it needs.
permissions:
  contents: read

jobs:
  build-and-sign:
    name: Build and sign release artifacts
    runs-on: macos-latest

    permissions:
      contents: write
      id-token: write

    outputs:
      hashes: ${{ steps.sign.outputs.hashes }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Adjust this command to match Chaterm's actual release build command.
      - name: Build release artifacts
        run: npm run build

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign release artifacts
        id: sign
        env:
          COSIGN_YES: 'true'
          # Adjust this if your build output directory is not "dist".
          ARTIFACT_SOURCE_DIR: 'dist'
          ARTIFACT_OUTPUT_DIR: 'release-assets'
        run: |
          chmod +x scripts/sign-release-artifacts.sh
          scripts/sign-release-artifacts.sh

      - name: Upload GitHub Release assets
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: release-assets/*

  provenance:
    name: Generate SLSA provenance
    needs: build-and-sign

    permissions:
      actions: read
      id-token: write
      contents: write

    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a # v2.1.0
    with:
      base64-subjects: ${{ needs.build-and-sign.outputs.hashes }}
      upload-assets: true
